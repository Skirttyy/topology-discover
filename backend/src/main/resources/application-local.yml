spring:
  datasource:
    url: jdbc:h2:file:./data/topology-db;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop   # recreaza schema la fiecare restart — necesar dupa adaugarea MIKROTIK enum
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.topo.discovery: DEBUG
