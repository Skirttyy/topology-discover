spring:
  application:
    name: topology-discovery

  # Profil activ implicit: 'local' (H2). Pentru Proxmox/productie, foloseste 'docker' (Postgres)
  profiles:
    active: local

  jackson:
    serialization:
      indent_output: true

server:
  port: 8080

# Configurare Jasypt - cheia de criptare vine din variabila de mediu JASYPT_ENCRYPTOR_PASSWORD
# NICIODATA nu se hardcodeaza in fisier. Vezi README pentru cum se seteaza.
jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD:CHANGE_ME_IN_ENV}
    algorithm: PBEWITHHMACSHA512ANDAES_256
    iv-generator-classname: org.jasypt.iv.RandomIvGenerator

# Configurari proprii ale aplicatiei de discovery
discovery:
  ssh:
    connect-timeout-ms: 4000   # era 8000 — lab local, 4s e suficient
    command-timeout-ms: 8000   # era 15000 — comenzile simple nu dureaza mai mult
  snmp:
    community: public
    timeout-ms: 1500           # era 3000 — local LAN, 1.5s e suficient
    retries: 0                 # era 1 — 0 retry = 2x mai rapid la fail (nu retry pe device mort)
  subnet-scan:
    parallel-threads: 50       # era 20 — mai rapid pentru /24 (254 IP-uri)
    port-check: 22
    port-timeout-ms: 500       # era 1000 — lab local, 500ms ajunge
  bfs:
    max-depth: 10
    max-devices: 200
    parallel-threads: 10       # era 5 — mai multe device-uri in paralel

springdoc:
  swagger-ui:
    path: /swagger-ui.html
