spring:
  application:
    name: topology-discovery

  # Profil activ implicit: 'local' (H2). Pentru Proxmox/productie, foloseste 'docker' (Postgres)
  profiles:
    active: local

  jackson:
    serialization:
      indent_output: true

server:
  port: 8080

# Configurare Jasypt - cheia de criptare vine din variabila de mediu JASYPT_ENCRYPTOR_PASSWORD
# NICIODATA nu se hardcodeaza in fisier. Vezi README pentru cum se seteaza.
jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD:CHANGE_ME_IN_ENV}
    algorithm: PBEWITHHMACSHA512ANDAES_256
    iv-generator-classname: org.jasypt.iv.RandomIvGenerator

# Configurari proprii ale aplicatiei de discovery
discovery:
  ssh:
    connect-timeout-ms: 8000   # lab EVE-NG cu vMX/vQFX e lent la handshake-ul SSH
    command-timeout-ms: 12000  # 'show version' pe Junos virtualizat poate dura
  snmp:
    community: public
    timeout-ms: 2000           # lab virtualizat lent — 2s reduce timeout-urile false
    retries: 1                 # 1 retry recupereaza pierderile ocazionale de pachete UDP
  subnet-scan:
    parallel-threads: 50       # doar TCP connect — ramane rapid
    port-check: 22
    port-timeout-ms: 800       # putin mai generos ca sa prindem host-uri lente
  bfs:
    max-depth: 10
    max-devices: 200
    # IMPORTANT: paralelism redus. 10 thread-uri x 8 walk-uri SNMP = ~80 sesiuni UDP
    # simultane care satureaza lab-ul virtual si cauzeaza timeout-uri aleatorii.
    # 4 thread-uri = ~32 sesiuni = polling mult mai fiabil (rateaza mai rar SNMP/SSH/LLDP).
    parallel-threads: 4

springdoc:
  swagger-ui:
    path: /swagger-ui.html
