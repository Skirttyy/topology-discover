version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: topo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-topology}
      POSTGRES_USER: ${DB_USER:-topology_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?seteaza DB_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-topology_user}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: topo-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-topology}
      DB_USER: ${DB_USER:-topology_user}
      DB_PASSWORD: ${DB_PASSWORD:?seteaza DB_PASSWORD in .env}
      JASYPT_ENCRYPTOR_PASSWORD: ${JASYPT_ENCRYPTOR_PASSWORD:?seteaza JASYPT_ENCRYPTOR_PASSWORD in .env}
    ports:
      - "8080:8080"
    # IMPORTANT pentru lab-ul EVE-NG: daca reteaua de management a lab-ului
    # nu e rutabila direct din containerul Docker (de ex. e pe alt vSwitch
    # din Proxmox), poate fi necesar "network_mode: host" in loc de port
    # mapping de mai sus. Vezi README -> sectiunea "Conectivitate catre EVE-NG".

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    container_name: topo-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres-data:
